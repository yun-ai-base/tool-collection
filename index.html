<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具收藏集</title>
<style>
:root {
  --bg: #f8fafc;
  --card-bg: #ffffff;
  --card-border: #f1f5f9;
  --text: #1e293b;
  --text-secondary: #475569;
  --text-muted: #64748b;
  --text-placeholder: #94a3b8;
  --primary: #6366f1;
  --primary-light: #eef2ff;
  --primary-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.04);
  --shadow-md: 0 8px 24px rgba(99,102,241,.12);
  --shadow-lg: 0 16px 48px rgba(0,0,0,.15);
  --radius-card: 16px;
  --radius-tag: 100px;
  --radius-input: 100px;
  --transition: .2s cubic-bezier(.4,0,.2,1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* Header */
.header {
  text-align: center;
  padding: 48px 24px 28px;
}
.header-icon {
  font-size: 36px;
  margin-bottom: 8px;
}
.header h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.header p {
  font-size: 13px;
  color: var(--text-muted);
}

/* Controls */
.controls {
  max-width: 640px;
  margin: 0 auto 12px;
  padding: 0 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.search-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  padding: 10px 16px 10px 38px;
  border: 1.5px solid #e2e8f0;
  border-radius: var(--radius-input);
  font-size: 13px;
  color: var(--text);
  background: white;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.search-wrap input::placeholder { color: var(--text-placeholder); }
.search-wrap input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(99,102,241,.1);
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--text-placeholder);
  pointer-events: none;
}

/* Filter Tags */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0 20px 28px;
  max-width: 800px;
  margin: 0 auto;
}
.filter-tag {
  padding: 6px 16px;
  border-radius: var(--radius-tag);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid #e2e8f0;
  background: white;
  color: var(--text-muted);
  transition: all var(--transition);
  user-select: none;
}
.filter-tag:hover {
  border-color: #c7d2fe;
  color: var(--primary);
}
.filter-tag.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

/* Grid */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 80px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

/* Card */
.card {
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-card);
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.card:hover {
  transform: translateY(-2px);
  border-color: #c7d2fe;
  box-shadow: var(--shadow-md);
}
.card-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}
.card-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.card-title-area { flex: 1; min-width: 0; }
.card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-domain {
  font-size: 11px;
  color: var(--text-placeholder);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.55;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.card-tag-cat { font-weight: 600; }

/* Empty State */
.empty {
  text-align: center;
  padding: 60px 24px;
  grid-column: 1 / -1;
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; color: var(--text-muted); }

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  grid-column: 1 / -1;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #e2e8f0;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { margin-top: 14px; font-size: 13px; color: var(--text-muted); }

/* Modal Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.5);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Modal */
.modal {
  background: white;
  border-radius: 20px;
  max-width: 580px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp .25s ease;
  position: relative;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.modal-body { padding: 28px; }

.modal-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 18px;
}
.modal-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.modal-title-area { flex: 1; min-width: 0; }
.modal-name { font-size: 20px; font-weight: 700; color: var(--text); }
.modal-url {
  font-size: 13px;
  color: var(--primary);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  word-break: break-all;
}
.modal-url:hover { text-decoration: underline; }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: none;
  background: #f1f5f9;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
}
.modal-close:hover { background: #e2e8f0; color: var(--text); }

.modal-desc {
  background: var(--bg);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.65;
}

.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }

.tag {
  padding: 4px 12px;
  border-radius: var(--radius-tag);
  font-size: 11px;
  font-weight: 500;
}

/* Review */
.review-section {
  border-left: 3px solid var(--primary);
  padding-left: 14px;
  margin-bottom: 24px;
}
.review-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 6px;
}
.review-text {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.75;
}

/* Related */
.related-section { }
.related-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 10px;
}
.related-list { display: flex; flex-direction: column; gap: 8px; }
.related-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  background: var(--bg);
  border-radius: 12px;
  text-decoration: none;
  border: 1.5px solid transparent;
  transition: all var(--transition);
}
.related-item:hover {
  border-color: #c7d2fe;
  background: white;
}
.related-emoji { font-size: 18px; flex-shrink: 0; }
.related-info { flex: 1; min-width: 0; }
.related-name { font-size: 13px; font-weight: 600; color: var(--text); }
.related-desc { font-size: 11px; color: var(--text-placeholder); }
.related-arrow {
  color: var(--text-placeholder);
  font-size: 14px;
  flex-shrink: 0;
  transition: all var(--transition);
}
.related-item:hover .related-arrow { color: var(--primary); transform: translateX(2px); }

/* Footer */
.footer {
  text-align: center;
  padding: 0 24px 36px;
  font-size: 11px;
  color: var(--text-placeholder);
}
.footer a { color: var(--primary); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* Responsive */
@media (max-width: 640px) {
  .header { padding: 36px 20px 20px; }
  .header h1 { font-size: 20px; }
  .controls { padding: 0 16px; }
  .filter-bar { padding: 0 16px 20px; }
  .grid { grid-template-columns: 1fr; gap: 10px; }
  .card { padding: 16px; }
  .modal { margin: 0; border-radius: 20px 20px 0 0; max-height: 90vh; }
  .modal-body { padding: 22px; }
  .overlay { align-items: flex-end; padding: 0; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔧</div>
  <h1>工具收藏集</h1>
  <p>精选工具 · AI 点评 · 一触即达</p>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="搜索工具名称或描述...">
  </div>
</div>

<div class="filter-bar" id="filterBar"></div>

<div class="container">
  <div class="grid" id="grid">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">加载工具列表中...</div>
    </div>
  </div>
</div>

<div class="footer">
  🐙 由 <a href="https://github.com/yun-ai-base" target="_blank">yun-ai-base</a> 托管于 GitHub Pages · 最后更新 <span id="updated">--</span>
</div>

<div id="overlayContainer"></div>

<script>
const grid = document.getElementById('grid');
const filterBar = document.getElementById('filterBar');
const searchInput = document.getElementById('search');
const overlayContainer = document.getElementById('overlayContainer');
const updatedEl = document.getElementById('updated');

let categories = [];
let tools = [];
let activeCategory = 'all';
let activeToolId = null;

function extractDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); }
  catch { return url; }
}

function getCategoryColor(catId) {
  const found = categories.find(c => c.id === catId);
  return found ? found.color : '#8b5cf6';
}

function getCategoryIcon(catId) {
  const found = categories.find(c => c.id === catId);
  return found ? found.icon : '📌';
}

function getCategoryName(catId) {
  const found = categories.find(c => c.id === catId);
  return found ? found.name : catId;
}

function renderTag(text, bg, color, cls) {
  return `<span class="tag ${cls || ''}" style="background:${bg};color:${color};">${text}</span>`;
}

function renderCard(tool) {
  const color = getCategoryColor(tool.category);
  const domain = extractDomain(tool.url);
  const catTag = renderTag(
    getCategoryIcon(tool.category) + ' ' + getCategoryName(tool.category),
    hexToRgba(color, .12), color, 'card-tag-cat'
  );
  const tagHtml = tool.tags.map(t =>
    renderTag(t, '#f1f5f9', '#64748b')
  ).join('');

  return `
    <div class="card" data-id="${tool.id}" onclick="openModal('${tool.id}')">
      <div class="card-header">
        <div class="card-icon" style="background:${hexToRgba(color,.12)};color:${color};">${tool.icon}</div>
        <div class="card-title-area">
          <div class="card-name">${escHtml(tool.name)}</div>
          <div class="card-domain">${domain}</div>
        </div>
      </div>
      <div class="card-desc">${escHtml(tool.description)}</div>
      <div class="card-tags">${catTag}${tagHtml}</div>
    </div>
  `;
}

function renderGrid(filtered) {
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">没有找到匹配的工具</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

function renderFilterBar() {
  const allActive = activeCategory === 'all' ? 'active' : '';
  let html = `<div class="filter-tag ${allActive}" data-cat="all">全部</div>`;
  categories.forEach(c => {
    const active = activeCategory === c.id ? 'active' : '';
    html += `<div class="filter-tag ${active}" data-cat="${c.id}">${c.icon} ${c.name}</div>`;
  });
  filterBar.innerHTML = html;

  filterBar.querySelectorAll('.filter-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      activeCategory = tag.dataset.cat;
      renderFilterBar();
      filterAndRender();
    });
  });
}

function filterAndRender() {
  const query = searchInput.value.toLowerCase().trim();
  let filtered = tools;
  if (activeCategory !== 'all') {
    filtered = filtered.filter(t => t.category === activeCategory);
  }
  if (query) {
    filtered = filtered.filter(t =>
      t.name.toLowerCase().includes(query) ||
      t.description.toLowerCase().includes(query) ||
      t.tags.some(tag => tag.toLowerCase().includes(query))
    );
  }
  renderGrid(filtered);
}

function openModal(id) {
  const tool = tools.find(t => t.id === id);
  if (!tool) return;
  activeToolId = id;

  const color = getCategoryColor(tool.category);
  const relatedHtml = (tool.related || []).map(r => `
    <a class="related-item" href="${escHtml(r.url)}" target="_blank" rel="noopener">
      <span class="related-emoji">🔗</span>
      <div class="related-info">
        <div class="related-name">${escHtml(r.name)}</div>
        <div class="related-desc">${escHtml(r.desc)}</div>
      </div>
      <span class="related-arrow">→</span>
    </a>
  `).join('');

  overlayContainer.innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-body">
          <div class="modal-header">
            <div class="modal-icon" style="background:${hexToRgba(color,.12)};color:${color};">${tool.icon}</div>
            <div class="modal-title-area">
              <div class="modal-name">${escHtml(tool.name)}</div>
              <a class="modal-url" href="${escHtml(tool.url)}" target="_blank" rel="noopener">${extractDomain(tool.url)} →</a>
            </div>
            <button class="modal-close" onclick="closeModal()" aria-label="关闭">✕</button>
          </div>

          <div class="modal-desc">${escHtml(tool.description)}</div>

          <div class="modal-tags">
            ${renderTag(getCategoryIcon(tool.category) + ' ' + getCategoryName(tool.category), hexToRgba(color,.12), color)}
            ${tool.tags.map(t => renderTag(t, '#f1f5f9', '#64748b')).join('')}
          </div>

          ${tool.review ? `
          <div class="review-section">
            <div class="review-label">🤖 AI 点评</div>
            <div class="review-text">${escHtml(tool.review)}</div>
          </div>` : ''}

          ${relatedHtml ? `
          <div class="related-section">
            <div class="related-label">🔗 周边推荐</div>
            <div class="related-list">${relatedHtml}</div>
          </div>` : ''}
        </div>
      </div>
    </div>
  `;

  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlayContainer.innerHTML = '';
  activeToolId = null;
  document.body.style.overflow = '';
}

function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

searchInput.addEventListener('input', filterAndRender);

// Init
(async function init() {
  try {
    const resp = await fetch('tools.json');
    if (!resp.ok) throw new Error('fetch failed');
    const data = await resp.json();
    categories = data.categories || [];
    tools = data.tools || [];
    updatedEl.textContent = data.updated || '--';
  } catch (err) {
    console.warn('加载 tools.json 失败，使用离线数据', err);
    categories = [
      { "id": "ai", "name": "AI 工具", "icon": "🤖", "color": "#6366f1" },
      { "id": "dev", "name": "开发工具", "icon": "⚙️", "color": "#f59e0b" }
    ];
    tools = [
      { "id":"fallback","name":"示例工具","url":"https://github.com","icon":"📌","description":"数据加载失败，显示离线示例","category":"dev","tags":["离线"],"review":"","related":[] }
    ];
    updatedEl.textContent = '离线模式';
  }

  renderFilterBar();
  filterAndRender();
})();
</script>

</body>
</html>
